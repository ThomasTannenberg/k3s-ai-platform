---
- name: Create local application secrets in Kubernetes
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    kubeconfig_path: "{{ playbook_dir }}/k3s.yaml"
    local_secrets_dir: "{{ playbook_dir }}/../../.local-secrets"
    keycloak_env_file: "{{ local_secrets_dir }}/keycloak.env"

  tasks:
    - name: Ensure local secrets directory exists
      ansible.builtin.file:
        path: "{{ local_secrets_dir }}"
        state: directory
        mode: "0700"

    - name: Check if Keycloak env file exists
      ansible.builtin.stat:
        path: "{{ keycloak_env_file }}"
      register: keycloak_env_stat

    - name: Generate Keycloak and Open WebUI secret values
      ansible.builtin.set_fact:
        generated_keycloak_admin_password: "{{ lookup('ansible.builtin.password', '/dev/null length=32 chars=ascii_letters,digits') }}"
        generated_keycloak_postgres_admin_password: "{{ lookup('ansible.builtin.password', '/dev/null length=32 chars=ascii_letters,digits') }}"
        generated_keycloak_postgres_user_password: "{{ lookup('ansible.builtin.password', '/dev/null length=32 chars=ascii_letters,digits') }}"
        generated_openwebui_oidc_client_secret: "{{ lookup('ansible.builtin.password', '/dev/null length=48 chars=ascii_letters,digits') }}"
      no_log: true
      when: not keycloak_env_stat.stat.exists

    - name: Create Keycloak env file with generated values
      ansible.builtin.copy:
        dest: "{{ keycloak_env_file }}"
        mode: "0600"
        force: false
        content: |
          KEYCLOAK_ADMIN_PASSWORD='{{ generated_keycloak_admin_password }}'
          KEYCLOAK_POSTGRES_ADMIN_PASSWORD='{{ generated_keycloak_postgres_admin_password }}'
          KEYCLOAK_POSTGRES_USER_PASSWORD='{{ generated_keycloak_postgres_user_password }}'
          OPENWEBUI_OIDC_CLIENT_SECRET='{{ generated_openwebui_oidc_client_secret }}'
      no_log: true
      when: not keycloak_env_stat.stat.exists

    - name: Read local Keycloak env file
      ansible.builtin.set_fact:
        keycloak_env: "{{ lookup('ansible.builtin.file', keycloak_env_file) }}"
      no_log: true

    - name: Parse Keycloak and Open WebUI secret values
      ansible.builtin.set_fact:
        keycloak_admin_password: "{{ keycloak_env | regex_search('KEYCLOAK_ADMIN_PASSWORD=[\"'']?([^\"''\\n]+)[\"'']?', '\\1') | first }}"
        keycloak_postgres_admin_password: "{{ keycloak_env | regex_search('KEYCLOAK_POSTGRES_ADMIN_PASSWORD=[\"'']?([^\"''\\n]+)[\"'']?', '\\1') | first }}"
        keycloak_postgres_user_password: "{{ keycloak_env | regex_search('KEYCLOAK_POSTGRES_USER_PASSWORD=[\"'']?([^\"''\\n]+)[\"'']?', '\\1') | first }}"
        openwebui_oidc_client_secret: "{{ keycloak_env | regex_search('OPENWEBUI_OIDC_CLIENT_SECRET=[\"'']?([^\"''\\n]+)[\"'']?', '\\1') | first }}"
      no_log: true

    - name: Fail if local secret file still contains placeholder values
      ansible.builtin.fail:
        msg: "Die Datei .local-secrets/keycloak.env enthält noch Platzhalterwerte. Bitte Datei löschen oder echte Werte eintragen."
      when:
        - keycloak_admin_password in ["DEIN_KEYCLOAK_ADMIN_PASSWORT", "CHANGE_ME_KEYCLOAK_ADMIN_PASSWORD"]
          or keycloak_postgres_admin_password in ["DEIN_POSTGRES_ADMIN_PASSWORT", "CHANGE_ME_POSTGRES_ADMIN_PASSWORD"]
          or keycloak_postgres_user_password in ["DEIN_KEYCLOAK_DB_PASSWORT", "CHANGE_ME_KEYCLOAK_DB_PASSWORD"]
          or openwebui_oidc_client_secret in ["DEIN_OPENWEBUI_OIDC_CLIENT_SECRET", "CHANGE_ME_OPENWEBUI_OIDC_CLIENT_SECRET"]

    - name: Check kubectl is available
      ansible.builtin.command: kubectl version --client
      changed_when: false

    - name: Check kubeconfig exists
      ansible.builtin.stat:
        path: "{{ kubeconfig_path }}"
      register: kubeconfig_stat

    - name: Fail if kubeconfig is missing
      ansible.builtin.fail:
        msg: "Kubeconfig fehlt: {{ kubeconfig_path }}. Bitte zuerst das k3s Setup ausführen."
      when: not kubeconfig_stat.stat.exists

    - name: Create keycloak namespace
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        create namespace keycloak
      register: keycloak_namespace_create
      failed_when:
        - keycloak_namespace_create.rc != 0
        - "'AlreadyExists' not in keycloak_namespace_create.stderr"
      changed_when: keycloak_namespace_create.rc == 0

    - name: Create or update Keycloak admin secret
      ansible.builtin.shell: |
        kubectl --kubeconfig {{ kubeconfig_path }} -n keycloak create secret generic keycloak-admin-secret \
          --from-literal=admin-password='{{ keycloak_admin_password }}' \
          --dry-run=client -o yaml | \
        kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
      args:
        executable: /bin/bash
      no_log: true

    - name: Create or update Keycloak PostgreSQL secret
      ansible.builtin.shell: |
        kubectl --kubeconfig {{ kubeconfig_path }} -n keycloak create secret generic keycloak-postgresql-secret \
          --from-literal=postgres-password='{{ keycloak_postgres_admin_password }}' \
          --from-literal=password='{{ keycloak_postgres_user_password }}' \
          --dry-run=client -o yaml | \
        kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
      args:
        executable: /bin/bash
      no_log: true

    - name: Create or update Open WebUI OIDC client secret
      ansible.builtin.shell: |
        kubectl --kubeconfig {{ kubeconfig_path }} -n keycloak create secret generic openwebui-oidc-client-secret \
          --from-literal=client-secret='{{ openwebui_oidc_client_secret }}' \
          --dry-run=client -o yaml | \
        kubectl --kubeconfig {{ kubeconfig_path }} apply -f -
      args:
        executable: /bin/bash
      no_log: true

    - name: Show created Keycloak related secrets
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        get secrets -n keycloak
      register: keycloak_secrets
      changed_when: false

    - name: Print Keycloak secret summary
      ansible.builtin.debug:
        msg: "{{ keycloak_secrets.stdout_lines }}"