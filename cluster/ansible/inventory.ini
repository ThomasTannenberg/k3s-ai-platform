# Inventar für das k3s Cluster
#
# VM Übersicht:
#   k3s-lb-1             192.168.178.50
#   k3s-server-1         192.168.178.51
#   k3s-agent-tools-1    192.168.178.62

[k3s_lb]
k3s-lb-1 ansible_host=192.168.178.50

[k3s_init]
k3s-server-1 ansible_host=192.168.178.51

[k3s_servers]

[k3s_agents]
k3s-agent-tools-1 ansible_host=192.168.178.62

[k3s_cluster:children]
k3s_init
k3s_servers
k3s_agents

[all:vars]
ansible_user=k3sadmin
ansible_ssh_private_key_file=~/.ssh/id_ed25519