ollama:
  enabled: false

pipelines:
  enabled: false

persistence:
  enabled: true
  size: 20Gi

service:
  type: ClusterIP
  port: 80
  containerPort: 8080

ingress:
  enabled: true
  class: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: ai.tannenberg.online
  tls: true

extraEnvVars:
  - name: WEBUI_URL
    value: "https://ai.tannenberg.online"

  - name: OLLAMA_BASE_URL
    value: "http://ollama-host.open-webui.svc.cluster.local:11434"
  
  - name: OLLAMA_BASE_URLS
    value: "http://ollama-host.open-webui.svc.cluster.local:11434"
  
  - name: ENABLE_OLLAMA_API
    value: "true"

  - name: ENABLE_OAUTH_SIGNUP
    value: "true"

  - name: DEFAULT_USER_ROLE
    value: "user"

  - name: ENABLE_SIGNUP
    value: "false"

  - name: ENABLE_LOGIN_FORM
    value: "false"

  - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
    value: "true"

  - name: OAUTH_CLIENT_ID
    value: "open-webui"

  - name: OAUTH_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: open-webui-oidc-secret
        key: OAUTH_CLIENT_SECRET

  - name: OPENID_PROVIDER_URL
    value: "https://auth.tannenberg.online/realms/tannenberg/.well-known/openid-configuration"

  - name: OAUTH_PROVIDER_NAME
    value: "Keycloak"

  - name: OPENID_REDIRECT_URI
    value: "https://ai.tannenberg.online/oauth/oidc/callback"